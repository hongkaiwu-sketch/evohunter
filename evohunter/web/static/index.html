<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EvoHunter</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header class="topbar">
  <a href="/" class="logo">Evo<span>Hunter</span></a>

  <div class="pipeline-bar" id="pipeline">
    <div class="pl-node" data-node="jd">
      <span class="pl-dot"></span>
      <strong>JD</strong>
      <small>Generate</small>
    </div>
    <div class="pl-edge"></div>
    <div class="pl-node" data-node="parse">
      <span class="pl-dot"></span>
      <strong>Parse</strong>
      <small>Assess</small>
    </div>
    <div class="pl-edge"></div>
    <div class="pl-node" data-node="outreach">
      <span class="pl-dot"></span>
      <strong>Outreach</strong>
      <small>Contact</small>
    </div>
    <div class="pl-edge"></div>
    <div class="pl-node" data-node="report">
      <span class="pl-dot"></span>
      <strong>Report</strong>
      <small>Evaluate</small>
    </div>
  </div>

  <nav class="topbar-nav">
    <span class="badge" id="gen-badge">Gen 0</span>
    <a href="/evolution" class="nav-link">Evolution →</a>
  </nav>
</header>

<main class="workbench">

  <!-- Input Row -->
  <section class="input-row">
    <div class="input-group">
      <label for="jd-input">Job Description</label>
      <textarea id="jd-input" placeholder="Paste a job description or describe the role...&#10;&#10;e.g. AI Agent Engineer, Shanghai, 3+ years Python/LLM, 25k-40k" rows="5"></textarea>
    </div>
    <div class="input-group">
      <label for="resume-input">Resume</label>
      <textarea id="resume-input" placeholder="Paste candidate resume text...&#10;&#10;e.g. Alice Zhang has 5 years of Python and LLM experience..." rows="5"></textarea>
    </div>
    <div class="input-actions">
      <button id="run-btn" class="run-btn">Run Pipeline</button>
      <span class="run-hint">or Ctrl+Enter</span>
    </div>
  </section>

  <!-- Split: Cards + Detail -->
  <section class="content-row">
    <div class="cards-panel" id="cards-panel">
      <div class="panel-header">
        <h2>Candidates</h2>
        <span class="count" id="candidate-count">0</span>
      </div>
      <div class="cards-list" id="cards-list">
        <div class="empty-hint">
          <div class="empty-icon">◈</div>
          <p>Paste a JD and resume above,<br>then run the pipeline to see results.</p>
        </div>
      </div>
    </div>

    <aside class="detail-panel" id="detail-panel">
      <div class="detail-empty">
        <p>Select a candidate<br>to view details</p>
      </div>
      <div class="detail-content" id="detail-content" hidden></div>
    </aside>
  </section>

  <!-- Status Bar -->
  <footer class="status-bar">
    <span id="sb-generation">Gen 0</span>
    <span class="sep">·</span>
    <span id="sb-candidates">0 candidates</span>
    <span class="sep">·</span>
    <span id="sb-avg">avg —</span>
    <span class="sep">·</span>
    <span id="sb-strategy">balanced</span>
    <span class="sep">·</span>
    <span class="status-dot" id="api-dot"></span>
    <span id="api-status">checking API</span>
    <span class="sep">·</span>
    <a href="/evolution" class="status-link">Evolution →</a>
  </footer>

</main>

<script src="/static/app.js"></script>
</body>
</html>
