<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EvoHunter</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header class="topbar">
  <a href="/" class="logo">Evo<span>Hunter</span></a>
  <span class="badge" id="gen-badge">Gen 0</span>
  <nav class="topbar-nav">
    <button class="seed-btn" id="seed-btn" title="Load demo data">Seed Demo</button>
    <a href="/evolution" class="nav-link">Evolution →</a>
  </nav>
</header>

<main class="workbench">

  <!-- Search -->
  <section class="search-bar">
    <input type="text" id="search-skills" placeholder="Skills: python, llm, kubernetes..." autocomplete="off">
    <input type="text" id="search-location" placeholder="Location: shanghai" autocomplete="off">
    <select id="search-level">
      <option value="">Any level</option>
      <option value="intern">Intern</option>
      <option value="junior">Junior</option>
      <option value="mid">Mid</option>
      <option value="senior">Senior</option>
      <option value="lead">Lead</option>
    </select>
    <button class="search-btn" id="search-btn">Search</button>
  </section>

  <!-- Two sides -->
  <section class="dual-panel">

    <div class="side-panel">
      <div class="side-hdr">
        <h2>🏢 Companies <span class="count" id="jd-count">0</span></h2>
        <div class="side-actions">
          <button class="side-sel-btn" id="jd-select-all">All</button>
          <button class="side-sel-btn" id="jd-select-none">None</button>
          <button class="add-btn" id="add-jd-btn">+ Import JD</button>
        </div>
      </div>
      <div class="add-form" id="jd-form" hidden>
        <textarea id="jd-input" rows="3" placeholder="Paste a job description..."></textarea>
        <div class="form-actions">
          <button class="action-btn primary-action" id="jd-parse-btn">Parse & Add</button>
          <button class="action-btn" id="jd-cancel-btn">Cancel</button>
        </div>
        <div class="form-msg" id="jd-msg"></div>
      </div>
      <div class="item-list" id="jd-list"></div>
    </div>

    <div class="side-panel">
      <div class="side-hdr">
        <h2>👤 Candidates <span class="count" id="candidate-count">0</span></h2>
        <div class="side-actions">
          <button class="side-sel-btn" id="candidate-select-all">All</button>
          <button class="side-sel-btn" id="candidate-select-none">None</button>
          <button class="add-btn" id="add-resume-btn">+ Import CV</button>
        </div>
      </div>
      <div class="add-form" id="resume-form" hidden>
        <textarea id="resume-input" rows="3" placeholder="Paste a resume..."></textarea>
        <div class="form-actions">
          <button class="action-btn primary-action" id="resume-parse-btn">Parse & Add</button>
          <button class="action-btn" id="resume-cancel-btn">Cancel</button>
        </div>
        <div class="form-msg" id="resume-msg"></div>
      </div>
      <div class="item-list" id="candidate-list"></div>
    </div>

  </section>

  <!-- Match bar -->
  <section class="match-bar">
    <span class="match-info" id="match-info">Select companies and candidates to match</span>
    <button class="run-btn" id="match-btn" disabled>Match Selected</button>
  </section>

  <!-- Results -->
  <section class="results-area" id="results-area">
    <div class="results-hdr">
      <h2>Match Results</h2>
      <span class="count" id="result-count">0</span>
    </div>
    <div class="cards-list" id="results-list">
      <div class="empty-hint">
        <div class="empty-icon">◈</div>
        <p id="empty-msg">Click "Seed Demo" to load sample data,<br>then search and match.</p>
      </div>
    </div>
    <div class="detail-wrap" id="detail-wrap" hidden>
      <div class="detail-content" id="detail-content"></div>
    </div>
  </section>

  <footer class="status-bar">
    <span id="sb-generation">Gen 0</span><span class="sep">·</span>
    <span id="sb-jds">0 JDs</span><span class="sep">·</span>
    <span id="sb-candidates">0 candidates</span><span class="sep">·</span>
    <span id="sb-strategy">balanced</span><span class="sep">·</span>
    <span class="status-dot" id="api-dot"></span>
    <span id="api-status">checking</span>
    <a href="/evolution" class="status-link">Evolution →</a>
  </footer>

</main>

<script src="/static/app.js"></script>
</body>
</html>
